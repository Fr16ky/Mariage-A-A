<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#211f26" />

<title>Annette & Alexis — Trouvez votre table</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<!-- SheetJS (lecture Excel) -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

<div class="bg"></div>
<div class="bg-veil"></div>

<main class="app">

  <header class="hero">
    <div class="monogram-wrap" aria-hidden="true">
      <svg class="sprig sprig-left" viewBox="0 0 60 90" fill="none">
        <path class="sprig-path" d="M55 5 C40 15 35 30 30 45 C25 60 20 75 5 85" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path class="sprig-path" d="M42 20 C36 22 31 20 27 15" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <path class="sprig-path" d="M35 35 C29 37 24 35 20 30" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <path class="sprig-path" d="M28 50 C22 52 17 50 13 45" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <path class="sprig-path" d="M20 65 C14 67 9 65 5 60" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>

      <div class="monogram">
        <span class="monogram-letter">A</span>
        <span class="monogram-amp">&amp;</span>
        <span class="monogram-letter">T</span>
      </div>

      <svg class="sprig sprig-right" viewBox="0 0 60 90" fill="none">
        <path class="sprig-path" d="M5 5 C20 15 25 30 30 45 C35 60 40 75 55 85" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path class="sprig-path" d="M18 20 C24 22 29 20 33 15" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <path class="sprig-path" d="M25 35 C31 37 36 35 40 30" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <path class="sprig-path" d="M32 50 C38 52 43 50 47 45" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <path class="sprig-path" d="M40 65 C46 67 51 65 55 60" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>

    <p class="eyebrow">Amandine &amp; Thomas</p>
  </header>

  <section class="card" id="card">

    <div class="card-face card-face--search" id="searchFace">
      <h1 class="card-title">Trouvez votre table</h1>
      <p class="card-subtitle">Entrez votre nom pour découvrir où vous êtes installé·e ce soir.</p>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M14 14L18 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input id="search" placeholder="Nom ou prénom…" autocomplete="off" inputmode="text"/>
      </div>

      <div id="suggestions" class="suggestions"></div>
    </div>

    <div class="card-face card-face--result hidden" id="result">
      <p class="result-label">Bienvenue</p>
      <p class="result-name" id="name"></p>
      <div class="result-divider"><span></span></div>
      <p class="result-table-label">Votre table</p>
      <p class="result-table" id="table"></p>
      <p class="result-msg">Très belle soirée ❤️</p>
      <button class="result-back" id="backBtn" type="button">← Chercher un autre nom</button>
    </div>

  </section>

  <p class="footnote">Un souci ? Rapprochez-vous de l'accueil.</p>

</main>

<div id="confetti-layer" aria-hidden="true"></div>

<script src="script.js"></script>

</body>
</html>
